name: Veda Core CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # Note: We use requirements.txt which has platform markers for Linux CI stability
        pip install -r requirements.txt
        pip install pytest pytest-mock
    - name: Run Tests
      run: |
        export PYTHONPATH=$PYTHONPATH:.
        # Specifically run tests that don't require GUI/Hardware in CI
        python -m pytest tests/test_core.py tests/test_memory.py tests/test_survival.py tests/veda_fallback_test.py
